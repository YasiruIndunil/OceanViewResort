<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean View Resort – View Reservation</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-brand">
        <span class="brand-icon">🌊</span>
        <div><strong>Ocean View Resort</strong><small>Management System</small></div>
    </div>
    <ul class="nav-links">
        <li><a href="dashboard.html"><span>📊</span> Dashboard</a></li>
        <li><a href="add-reservation.html"><span>➕</span> New Reservation</a></li>
        <li><a href="reservations.html"><span>📋</span> All Reservations</a></li>
        <li><a href="view-reservation.html" class="active"><span>🔍</span> View Reservation</a></li>
        <li><a href="billing.html"><span>💳</span> Billing</a></li>
        <li><a href="rooms.html"><span>🛏</span> Rooms</a></li>
        <li><a href="help.html"><span>❓</span> Help</a></li>
        <li><a href="../LogoutServlet" class="logout-link"><span>🚪</span> Logout</a></li>
    </ul>
</nav>

<main class="main-content">
    <header class="page-header">
        <h2>View Reservation</h2>
    </header>

    <div class="card">
        <div class="card-header"><h3>Search Reservation</h3></div>
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Enter Reservation Number (e.g. OVR-20250101-123456)"
                   style="flex:1">
            <button onclick="searchReservation()" class="btn btn-primary">🔍 Search</button>
        </div>
    </div>

    <div id="resultSection" style="display:none">
        <div class="card" id="resDetails">
            <div class="card-header">
                <h3>Reservation Details</h3>
                <div>
                    <a href="billing.html" id="billLink" class="btn btn-secondary btn-sm">💳 Generate Bill</a>
                    <button onclick="cancelReservation()" class="btn btn-danger btn-sm" id="cancelBtn">❌ Cancel</button>
                </div>
            </div>
            <div class="details-grid" id="detailsGrid"></div>
        </div>
    </div>

    <div id="errorSection" class="alert alert-error" style="display:none"></div>
</main>

<script src="../js/app.js"></script>
<script>
// Pre-fill from URL param
const urlRef = new URLSearchParams(window.location.search).get('ref');
if (urlRef) {
    document.getElementById('searchInput').value = urlRef;
    searchReservation();
}

async function searchReservation() {
    const resNum = document.getElementById('searchInput').value.trim();
    if (!resNum) { alert('Please enter a reservation number.'); return; }

    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('errorSection').style.display  = 'none';

    try {
        const resp = await fetch(`../api/reservations/${resNum}`);
        const data = await resp.json();

        if (!resp.ok) {
            document.getElementById('errorSection').textContent = data.error || 'Reservation not found.';
            document.getElementById('errorSection').style.display = 'block';
            return;
        }

        const grid = document.getElementById('detailsGrid');
        grid.innerHTML = `
            <div class="detail-item"><label>Reservation No.</label><span>${data.reservationNumber}</span></div>
            <div class="detail-item"><label>Status</label><span class="badge badge-${data.status.toLowerCase()}">${data.status}</span></div>
            <div class="detail-item"><label>Guest Name</label><span>${data.guestName}</span></div>
            <div class="detail-item"><label>Contact</label><span>${data.contactNumber}</span></div>
            <div class="detail-item"><label>Email</label><span>${data.email || '–'}</span></div>
            <div class="detail-item"><label>Address</label><span>${data.address || '–'}</span></div>
            <div class="detail-item"><label>Room</label><span>${data.roomNumber} – ${data.roomType}</span></div>
            <div class="detail-item"><label>Rate/Night</label><span>LKR ${Number(data.ratePerNight).toLocaleString()}</span></div>
            <div class="detail-item"><label>Check-In</label><span>${data.checkInDate}</span></div>
            <div class="detail-item"><label>Check-Out</label><span>${data.checkOutDate}</span></div>
            <div class="detail-item"><label>Nights</label><span>${data.numNights}</span></div>
            <div class="detail-item"><label>Guests</label><span>${data.numGuests}</span></div>
            <div class="detail-item"><label>Total Amount</label><span>LKR ${Number(data.totalAmount).toLocaleString()}</span></div>
            <div class="detail-item"><label>Special Requests</label><span>${data.specialRequests || '–'}</span></div>
            <div class="detail-item"><label>Created At</label><span>${data.createdAt}</span></div>`;

        document.getElementById('billLink').href = `billing.html?ref=${data.reservationNumber}`;
        document.getElementById('cancelBtn').dataset.ref = data.reservationNumber;
        document.getElementById('cancelBtn').style.display =
            data.status === 'CONFIRMED' ? 'inline-block' : 'none';

        document.getElementById('resultSection').style.display = 'block';
    } catch(e) {
        document.getElementById('errorSection').textContent = 'Network error. Please try again.';
        document.getElementById('errorSection').style.display = 'block';
    }
}

async function cancelReservation() {
    const ref = document.getElementById('cancelBtn').dataset.ref;
    if (!confirm(`Cancel reservation ${ref}? This cannot be undone.`)) return;

    const resp = await fetch(`../api/reservations/${ref}`, {method:'DELETE'});
    const data = await resp.json();
    alert(data.message || data.error);
    if (resp.ok) searchReservation();
}
</script>
</body>
</html>
