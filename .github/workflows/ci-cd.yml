name: Ocean View Resort – CI/CD Pipeline

on:
  push:
    branches: [ main, Dev_Branch ]
  pull_request:
    branches: [ main,Dev_Branch  ]

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Build & Test
  # ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for compile check)
        run: mvn clean compile -q

      - name: Run Unit Tests
        run: mvn test

      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: target/site/jacoco/

      - name: Print Test Summary
        if: always()
        run: |
          echo "=========================================="
          echo "  Ocean View Resort – Test Summary"
          echo "=========================================="
          find target/surefire-reports -name "*.txt" -exec cat {} \; 2>/dev/null || echo "No test report files found."

  # ──────────────────────────────────────────────────────────
  # JOB 2: Package WAR (only on main branch)
  # ──────────────────────────────────────────────────────────
  package:
    name: Package WAR file
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build WAR package
        run: mvn clean package -DskipTests

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: OceanViewResort-${{ github.sha }}
          path: target/*.war
          retention-days: 30

      - name: Display WAR info
        run: |
          echo "WAR file created:"
          ls -lh target/*.war

  # ──────────────────────────────────────────────────────────
  # JOB 3: Code Quality (Checkstyle)
  # ──────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Check for TODO/FIXME in code
        run: |
          echo "Checking for TODO/FIXME comments..."
          count=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" | wc -l)
          echo "Found $count TODO/FIXME items"

      - name: Verify no compilation warnings
        run: mvn clean compile 2>&1 | grep -i "warning" | head -20 || echo "No major warnings found"
